repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.410
    hooks:
      - id: pyright
        additional_dependencies: [rich, pyyaml]

  - repo: local
    hooks:
      - id: commit-conventions
        name: commit message conventions
        language: system
        stages: [commit-msg]
        entry: bash -c 'head -1 "$1" | grep -qE "^(feat|fix|chore|docs|refactor|test|style|perf|build|ci)(\(.+\))?\!?:" && { echo "No conventional-commit prefixes; use a bare imperative verb"; exit 1; }; grep -qiE "^co-authored-by:" "$1" && { echo "No authorship footers in commit messages"; exit 1; }; grep -qE "^🤖|Generated with \[" "$1" && { echo "No generator footers in commit messages"; exit 1; }; exit 0' --
      - id: verify-congruence
        name: verify congruence
        entry: python tools/verify.py
        language: system
        pass_filenames: false
        always_run: true
