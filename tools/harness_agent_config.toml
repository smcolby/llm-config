# Per-harness frontmatter rendering rules for shared/agents/*.md.
# sync.py reads this when rendering harnesses/{harness}/agents/.

[harnesses.pi]
filename_suffix = ".md"
# pi frontmatter: description only (name/model/tools are not used)
include_fields = ["description"]

[harnesses.copilot]
filename_suffix = ".agent.md"
# copilot frontmatter: all fields
include_fields = ["name", "description", "model", "tools"]
model = "claude-sonnet-4-6"
tools = ["read", "search", "edit", "execute"]

[harnesses.claude-code]
filename_suffix = ".md"
# claude-code subagents: name + description (+ optional tools as comma-separated string)
# model field is intentionally omitted so subagents inherit the session model
include_fields = ["name", "description", "tools"]
tools = "Read, Edit, Bash, Glob, Grep, Write"
