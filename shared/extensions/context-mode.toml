name = "context-mode"
repo = "https://github.com/mksglu/context-mode"
install = "npm install -g context-mode"
block = "context-mode"

[harnesses.claude-code]
verify_dir = "~/.claude/context-mode"
manual_setup = "/plugin marketplace add mksglu/context-mode"

[harnesses.copilot]
verify_mcp = "~/.copilot/mcp-config.json"
manual_setup = "Register context-mode MCP server in ~/.copilot/mcp-config.json"
