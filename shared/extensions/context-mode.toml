name = "context-mode"
repo = "https://github.com/mksglu/context-mode"
install = "npm install -g context-mode"
block = "context-mode"

# MCP server invocation — used by any harness that opts in via mechanisms = [..., "mcp"]
[mcp]
command = "context-mode"

[[hooks]]
copilot_event = "PreToolUse"
command = "context-mode hook vscode-copilot pretooluse"

[[hooks]]
copilot_event = "PostToolUse"
command = "context-mode hook vscode-copilot posttooluse"

[[hooks]]
copilot_event = "PreCompact"
command = "context-mode hook vscode-copilot precompact"

[[hooks]]
copilot_event = "SessionStart"
command = "context-mode hook vscode-copilot sessionstart"

[harnesses.claude-code]
mechanisms = ["plugin"]
# inner manifest link only — ~/.claude/context-mode itself is the tool's data dir
verify_dir = "~/.claude/context-mode/.claude-plugin"

[harnesses.copilot]
mechanisms = ["hook", "mcp"]
symlinks = [["harnesses/copilot/hooks/context-mode.json", "~/.github/hooks/context-mode.json"]]
verify_mcp = "~/.copilot/mcp-config.json"

[harnesses.pi]
mechanisms = ["pi-npm", "mcp"]
verify_pi_package = "npm:context-mode"
verify_mcp = "~/.pi/agent/mcp.json"
