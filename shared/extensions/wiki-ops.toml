name = "wiki-ops"

[[hooks]]
copilot_event = "Stop"
pi_event = "turn_end"
command = "~/repos/llm-wiki/tools/health-check.sh"
timeout = 5

[harnesses.claude-code]
# claude-code gets wiki-ops as a native skill at ~/.claude/skills/wiki-ops (bootstrap.py),
# plus the llm-wiki plugin link at ~/.claude/skills/llm-wiki for hooks
mechanisms = ["skill"]

[harnesses.copilot]
mechanisms = ["hook"]
symlinks = [["harnesses/copilot/hooks/wiki-ops.json", "~/.github/hooks/wiki-ops.json"]]

[harnesses.pi]
mechanisms = ["pi-ext"]
symlinks = [["harnesses/pi/extensions/wiki-ops.ts", "~/.pi/agent/extensions/wiki-ops.ts"]]
