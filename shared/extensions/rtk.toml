name = "RTK"
repo = "https://github.com/rtk-ai/rtk"
install = "brew install rtk"
block = "rtk"

[harnesses.claude-code]
verify_hook = "rtk hook claude"
manual_setup = "rtk init -g"

[harnesses.copilot]
symlinks = [["harnesses/copilot/hooks/rtk-rewrite.json", "~/.github/hooks/rtk-rewrite.json"]]
manual_setup = "rtk init -g --copilot"
