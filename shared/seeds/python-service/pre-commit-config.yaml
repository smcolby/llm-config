# Seed template — copy to .pre-commit-config.yaml, run `pre-commit autoupdate`,
# then `pre-commit install --hook-type pre-commit --hook-type commit-msg`
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: commit-conventions
        name: commit message conventions
        language: system
        stages: [commit-msg]
        entry: bash -c 'head -1 "$1" | grep -qE "^(feat|fix|chore|docs|refactor|test|style|perf|build|ci)(\\(.+\\))?\\!?:" && { echo "No conventional-commit prefixes; use a bare imperative verb"; exit 1; }; grep -qiE "^co-authored-by:" "$1" && { echo "No authorship footers in commit messages"; exit 1; }; grep -qE "^🤖|Generated with \\[" "$1" && { echo "No generator footers in commit messages"; exit 1; }; exit 0' --
      - id: pyright
        name: pyright
        entry: npx pyright
        language: system
        types: [python]
        pass_filenames: false
